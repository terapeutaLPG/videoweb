<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0a0c12" />
            <stop offset="1" stop-color="#111827" />
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#39d3ff" />
            <stop offset="1" stop-color="#6f5cff" />
        </linearGradient>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)" />
    <circle cx="220" cy="120" r="140" fill="#39d3ff" opacity="0.12" />
    <circle cx="1020" cy="120" r="180" fill="#6f5cff" opacity="0.10" />
    <circle cx="980" cy="520" r="220" fill="#ff6b7a" opacity="0.10" />

    <rect x="140" y="170" width="920" height="340" rx="28" fill="#121826"
