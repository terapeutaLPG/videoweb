    <rect x="170" y="200" width="860" height="280" rx="22" fill="url(#accent)" opacity="0.10" />

    <polygon points="520,255 520,425 700,340" fill="url(#accent)" />

    <text x="140" y="140" fill="#e7e9ef" font-size="48" font-family="Arial, sans-serif"
